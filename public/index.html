<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Club Announcements</title>
    <style>
        :root {
            color-scheme: light;
            --ink: #17202a;
            --muted: #5f6f7a;
            --line: #d9e2e7;
            --panel: #ffffff;
            --bg: #f4f7f8;
            --brand: #146c63;
            --brand-dark: #0e514a;
            --danger: #b42318;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            color: var(--ink);
            background: var(--bg);
        }

        header {
            background: #102a2f;
            color: #ffffff;
            padding: 24px;
        }

        .header-inner,
        main {
            width: min(1100px, calc(100% - 32px));
            margin: 0 auto;
        }

        h1 {
            margin: 0;
            font-size: 28px;
            font-weight: 700;
        }

        .subtitle {
            margin: 8px 0 0;
            color: #c9d7da;
        }

        main {
            display: grid;
            grid-template-columns: minmax(0, 1fr) 360px;
            gap: 20px;
            padding: 24px 0;
        }

        section,
        aside {
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 18px;
        }

        .toolbar {
            display: flex;
            gap: 10px;
            align-items: end;
            justify-content: space-between;
            margin-bottom: 16px;
        }

        .filters {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-size: 13px;
            font-weight: 700;
            color: #31414a;
        }

        input,
        select,
        textarea {
            width: 100%;
            border: 1px solid #c9d5db;
            border-radius: 6px;
            padding: 10px;
            font: inherit;
            background: #ffffff;
        }

        textarea {
            min-height: 130px;
            resize: vertical;
        }

        button {
            border: 0;
            border-radius: 6px;
            padding: 11px 14px;
            font: inherit;
            font-weight: 700;
            color: #ffffff;
            background: var(--brand);
            cursor: pointer;
        }

        button:hover {
            background: var(--brand-dark);
        }

        button.secondary {
            color: var(--brand);
            border: 1px solid var(--brand);
            background: #ffffff;
        }

        button.secondary:hover {
            background: #edf8f6;
        }

        .announcement-list {
            display: grid;
            gap: 12px;
        }

        .announcement {
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 14px;
            background: #fbfdfd;
        }

        .announcement h3 {
            margin: 0 0 8px;
            font-size: 18px;
        }

        .announcement p {
            margin: 0 0 12px;
            line-height: 1.5;
            color: #2d3b43;
        }

        .meta {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            font-size: 12px;
            color: var(--muted);
        }

        .badge {
            border: 1px solid #cbd8dd;
            border-radius: 999px;
            padding: 4px 8px;
            background: #ffffff;
        }

        .form-grid {
            display: grid;
            gap: 14px;
        }

        .status {
            margin-top: 12px;
            color: var(--muted);
            font-size: 14px;
        }

        .status.error {
            color: var(--danger);
        }

        @media (max-width: 820px) {
            main {
                grid-template-columns: 1fr;
            }

            .toolbar {
                display: grid;
                align-items: stretch;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-inner">
            <h1>Club Announcements</h1>
            <p class="subtitle">Share club updates, activities, and upcoming events.</p>
        </div>
    </header>

    <main>
        <section>
            <div class="toolbar">
                <div class="filters">
                    <div>
                        <label for="audienceFilter">Audience</label>
                        <select id="audienceFilter">
                            <option value="members">Members</option>
                            <option value="leaders">Leaders</option>
                            <option value="all">All</option>
                        </select>
                    </div>
                    <div>
                        <label for="clubFilter">Club ID</label>
                        <input id="clubFilter" type="number" min="1" placeholder="Optional">
                    </div>
                </div>
                <button class="secondary" id="refreshButton" type="button">Refresh</button>
            </div>

            <div id="announcementList" class="announcement-list"></div>
            <p id="listStatus" class="status">Loading announcements...</p>
        </section>

        <aside>
            <h2>Create Announcement</h2>
            <form id="announcementForm" class="form-grid">
                <div>
                    <label for="publisherRole">Publisher Role</label>
                    <select id="publisherRole">
                        <option value="leader">Leader</option>
                        <option value="admin">Admin</option>
                        <option value="club_leader">Club Leader</option>
                    </select>
                </div>
                <div>
                    <label for="title">Title</label>
                    <input id="title" required maxlength="150" placeholder="Meeting reminder">
                </div>
                <div>
                    <label for="content">Content</label>
                    <textarea id="content" required placeholder="Write the announcement..."></textarea>
                </div>
                <div>
                    <label for="audience">Audience</label>
                    <select id="audience">
                        <option value="members">Members</option>
                        <option value="leaders">Leaders</option>
                        <option value="all">All</option>
                    </select>
                </div>
                <div>
                    <label for="clubId">Club ID</label>
                    <input id="clubId" type="number" min="1" placeholder="Optional">
                </div>
                <div>
                    <label for="eventDate">Event Date</label>
                    <input id="eventDate" type="datetime-local">
                </div>
                <button type="submit">Post Announcement</button>
            </form>
            <p id="formStatus" class="status"></p>
        </aside>
    </main>

    <script>
        const list = document.getElementById("announcementList");
        const listStatus = document.getElementById("listStatus");
        const formStatus = document.getElementById("formStatus");
        const form = document.getElementById("announcementForm");
        const refreshButton = document.getElementById("refreshButton");

        function formatDate(value) {
            if (!value) {
                return "No event date";
            }

            return new Intl.DateTimeFormat(undefined, {
                dateStyle: "medium",
                timeStyle: "short",
            }).format(new Date(value));
        }

        function renderAnnouncements(announcements) {
            list.innerHTML = "";

            if (!announcements.length) {
                listStatus.textContent = "No announcements found.";
                return;
            }

            announcements.forEach((announcement) => {
                const item = document.createElement("article");
                item.className = "announcement";
                item.innerHTML = `
                    <h3>${escapeHtml(announcement.title)}</h3>
                    <p>${escapeHtml(announcement.content)}</p>
                    <div class="meta">
                        <span class="badge">Audience: ${escapeHtml(announcement.audience)}</span>
                        <span class="badge">Club: ${announcement.club_id || "All"}</span>
                        <span class="badge">${formatDate(announcement.event_date)}</span>
                    </div>
                `;
                list.appendChild(item);
            });

            listStatus.textContent = `${announcements.length} announcement(s) loaded.`;
        }

        function escapeHtml(value) {
            return String(value || "")
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        async function loadAnnouncements() {
            const params = new URLSearchParams();
            const audience = document.getElementById("audienceFilter").value;
            const clubId = document.getElementById("clubFilter").value;

            if (audience) {
                params.set("audience", audience);
            }

            if (clubId) {
                params.set("club_id", clubId);
            }

            listStatus.textContent = "Loading announcements...";
            listStatus.className = "status";

            try {
                const response = await fetch(`/api/announcements?${params.toString()}`);
                const result = await response.json();

                if (!response.ok) {
                    throw new Error(result.message || "Could not load announcements");
                }

                renderAnnouncements(result.data);
            } catch (error) {
                list.innerHTML = "";
                listStatus.textContent = error.message;
                listStatus.className = "status error";
            }
        }

        form.addEventListener("submit", async (event) => {
            event.preventDefault();

            const publisherRole = document.getElementById("publisherRole").value;
            const payload = {
                title: document.getElementById("title").value.trim(),
                content: document.getElementById("content").value.trim(),
                audience: document.getElementById("audience").value,
                club_id: document.getElementById("clubId").value || null,
                event_date: document.getElementById("eventDate").value || null,
            };

            formStatus.textContent = "Posting announcement...";
            formStatus.className = "status";

            try {
                const response = await fetch("/api/announcements", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "X-User-Role": publisherRole,
                        "X-User-Id": "1",
                    },
                    body: JSON.stringify(payload),
                });
                const result = response.status === 204 ? {} : await response.json();

                if (!response.ok) {
                    throw new Error(result.message || "Could not create announcement");
                }

                form.reset();
                formStatus.textContent = "Announcement posted.";
                await loadAnnouncements();
            } catch (error) {
                formStatus.textContent = error.message;
                formStatus.className = "status error";
            }
        });

        refreshButton.addEventListener("click", loadAnnouncements);
        document.getElementById("audienceFilter").addEventListener("change", loadAnnouncements);

        loadAnnouncements();
    </script>
</body>
</html>
